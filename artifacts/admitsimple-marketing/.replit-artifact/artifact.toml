kind = "web"
previewPath = "/admitsimple-marketing/"
title = "AdmitSimple Marketing Site"
version = "1.0.0"
id = "artifacts/admitsimple-marketing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admitsimple-marketing/" ]
localPort = 20006

[services.development]
run = "pnpm --filter @workspace/admitsimple-marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admitsimple-marketing", "run", "build" ]
publicDir = "artifacts/admitsimple-marketing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20006"
BASE_PATH = "/admitsimple-marketing/"
