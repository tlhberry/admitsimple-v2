kind = "web"
previewPath = "/"
title = "AdmitSimple"
version = "1.0.0"
id = "artifacts/admit-simple"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23889

[services.development]
run = "pnpm --filter @workspace/admit-simple run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admit-simple", "run", "build" ]
publicDir = "artifacts/admit-simple/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23889"
BASE_PATH = "/"
